<!-- Support for Mermaid -->
<script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({startOnLoad:true, theme:'default'});
    await mermaid.run({querySelector:'code.language-mermaid'});
</script>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    var rougeBlocks = document.querySelectorAll(".page__content .highlighter-rouge");
    rougeBlocks.forEach(function(block) {
      if (block.querySelector(".code-copy-button")) return;
      if (block.classList.contains("language-plaintext") || block.classList.contains("language-text")) return;
      var highlight = block.querySelector(".highlight");
      if (!highlight) return;
      var code = highlight.querySelector("code");
      if (code && (code.classList.contains("language-plaintext") || code.classList.contains("language-text"))) return;
      var button = document.createElement("button");
      button.className = "code-copy-button";
      button.type = "button";
      button.textContent = "Copy";
      button.setAttribute("aria-label", "Copy code");
      highlight.insertBefore(button, highlight.firstChild);
    });

    var copyButtons = document.querySelectorAll(".code-copy-button");
    copyButtons.forEach(function(button) {
      if (button.dataset.codexBound === "true") return;
      button.dataset.codexBound = "true";
      if (!button.textContent.trim()) {
        button.textContent = "Copy";
      }
      button.setAttribute("type", "button");
      button.setAttribute("aria-label", "Copy code");
      button.addEventListener("click", async function() {
        var pre = button.closest("pre");
        if (!pre) {
          var container = button.parentElement;
          pre = container ? container.querySelector("pre") : null;
        }
        var code = pre ? pre.querySelector("code") : null;
        if (!code) return;

        var clone = code.cloneNode(true);
        clone.querySelectorAll("a").forEach(function(anchor) {
          anchor.remove();
        });

        var text = clone.textContent.replace(/\s+$/, "");
        try {
          await navigator.clipboard.writeText(text);
          button.classList.add("is-copied");
          button.textContent = "Copied";
          window.setTimeout(function() {
            button.classList.remove("is-copied");
            button.textContent = "Copy";
          }, 1800);
        } catch (err) {
          button.textContent = "Copy failed";
          window.setTimeout(function() {
            button.textContent = "Copy";
          }, 1800);
        }
      });
    });
  });
</script>
